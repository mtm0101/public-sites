<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Public Sites</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --ink: #172033;
      --muted: #607086;
      --line: #d9e2ef;
      --brand: #174a7c;
      --brand-dark: #12385d;
      --soft: #eef6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--bg);
    }
    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0;
    }
    header {
      margin-bottom: 22px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--brand);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .intro {
      max-width: 760px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
    }
    table {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
    }
    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 11px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    th {
      background: #f2f7fd;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 400;
    }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #fbfdff; }
    .count-cell {
      width: 64px;
      color: var(--muted);
      font-weight: 400;
    }
    .column-tools {
      display: grid;
      gap: 8px;
    }
    .sort-button {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      font-weight: 400;
      padding: 0;
      text-align: left;
    }
    .sort-mark {
      min-width: 18px;
      color: var(--muted);
      text-align: right;
    }
    .filter-input {
      width: 100%;
      min-height: 30px;
      border: 1px solid #b8c7d9;
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      padding: 6px 9px;
    }
    .remarks-cell {
      min-width: 210px;
    }
    .remarks-input {
      display: block;
      width: 100%;
      min-height: 58px;
      resize: vertical;
      border: 1px solid #b8c7d9;
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      line-height: 1.4;
      padding: 7px 9px;
    }
    a {
      color: var(--brand);
      font-weight: 400;
      text-decoration: none;
      overflow-wrap: anywhere;
    }
    a:hover,
    a:focus-visible { text-decoration: underline; }
    .muted {
      color: var(--muted);
    }
    .empty {
      color: var(--muted);
      padding: 18px;
    }
    @media (max-width: 1180px) {
      .shell { width: min(100% - 24px, 1180px); padding: 28px 0; }
      .table-wrap {
        overflow: visible;
        border: 0;
        background: transparent;
        box-shadow: none;
      }
      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
        width: 100%;
        min-width: 0;
      }
      thead {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
      }
      thead tr {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 10px;
      }
      thead .count-cell {
        display: none;
      }
      th {
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      tbody {
        display: grid;
        gap: 12px;
      }
      tbody tr {
        display: grid;
        grid-template-columns: minmax(0, 0.42fr) minmax(0, 1fr);
        gap: 9px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        padding: 12px;
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
      }
      td {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        border-bottom: 0;
        padding: 0;
      }
      td > * {
        min-width: 0;
      }
      tbody .count-cell {
        width: auto;
      }
      td:nth-child(1) { order: 1; grid-column: 1; }
      td:nth-child(3) { order: 2; grid-column: 2; }
      td:nth-child(2) { order: 3; grid-column: 1 / -1; }
      td:nth-child(4) { order: 4; grid-column: 1 / -1; }
      td:nth-child(5) { order: 5; grid-column: 1 / -1; }
      td:nth-child(6) { order: 6; grid-column: 1 / -1; }
      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 11px;
        font-weight: 400;
        text-transform: uppercase;
      }
      .remarks-cell {
        min-width: 0;
      }
    }
    @media (max-width: 560px) {
      tbody tr {
        grid-template-columns: 1fr;
      }
      td,
      td:nth-child(1),
      td:nth-child(3) {
        grid-column: 1 / -1;
      }
      td {
        grid-template-columns: 84px minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Public index</p>
      <h1>Available Study Sites</h1>
      <p class="intro">Public folders are listed from newest to oldest by default.</p>
    </header>
    <div class="table-wrap">
      <table aria-label="Available study sites">
        <thead>
          <tr>
            <th class="count-cell" scope="col">#</th>
            <th scope="col" aria-sort="none">
              <div class="column-tools">
                <button class="sort-button" type="button" data-sort-key="folder">
                  <span>Folder</span><span class="sort-mark" aria-hidden="true"></span>
                </button>
                <input class="filter-input" type="search" data-filter-key="folder" placeholder="Filter folder" aria-label="Filter folder">
              </div>
            </th>
            <th scope="col" aria-sort="descending">
              <div class="column-tools">
                <button class="sort-button" type="button" data-sort-key="createdAt">
                  <span>Created date</span><span class="sort-mark" aria-hidden="true"></span>
                </button>
                <input class="filter-input" type="search" data-filter-key="createdAt" placeholder="Filter date" aria-label="Filter created date">
              </div>
            </th>
            <th scope="col" aria-sort="none">
              <div class="column-tools">
                <button class="sort-button" type="button" data-sort-key="title">
                  <span>Title</span><span class="sort-mark" aria-hidden="true"></span>
                </button>
                <input class="filter-input" type="search" data-filter-key="title" placeholder="Filter title" aria-label="Filter title">
              </div>
            </th>
            <th scope="col" aria-sort="none">
              <div class="column-tools">
                <button class="sort-button" type="button" data-sort-key="href">
                  <span>URL</span><span class="sort-mark" aria-hidden="true"></span>
                </button>
                <input class="filter-input" type="search" data-filter-key="href" placeholder="Filter URL" aria-label="Filter URL">
              </div>
            </th>
            <th scope="col" aria-sort="none">
              <div class="column-tools">
                <button class="sort-button" type="button" data-sort-key="remarks">
                  <span>Remarks</span><span class="sort-mark" aria-hidden="true"></span>
                </button>
                <input class="filter-input" type="search" data-filter-key="remarks" placeholder="Filter remarks" aria-label="Filter remarks">
              </div>
            </th>
          </tr>
        </thead>
        <tbody id="siteRows">
          <tr><td class="empty" colspan="6">Loading public sites...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const manifestElement = document.getElementById('siteManifest');
    const siteRows = document.getElementById('siteRows');
    const sortButtons = Array.from(document.querySelectorAll('[data-sort-key]'));
    const filterInputs = Array.from(document.querySelectorAll('[data-filter-key]'));
    const headerCells = Array.from(document.querySelectorAll('th[scope="col"]'));
    const remarksStoragePrefix = 'public-sites:remarks:v1:';
    const sortState = { key: 'createdAt', direction: 'desc' };
    const filters = { folder: '', createdAt: '', title: '', href: '', remarks: '' };
    const columns = {
      count: { label: '#' },
      folder: { label: 'Folder' },
      createdAt: { label: 'Created date' },
      title: { label: 'Title' },
      href: { label: 'URL' },
      remarks: { label: 'Remarks' }
    };

    function readManifest() {
      try {
        return JSON.parse(manifestElement.textContent);
      } catch (error) {
        return { sites: [] };
      }
    }

    function normalize(value) {
      return String(value || '').toLowerCase();
    }

    function hasPrivateSegment(value) {
      return String(value || '').split(/[\\/]/).some((part) => part.toLowerCase().endsWith('private'));
    }

    function getRemarkKey(site) {
      return `${remarksStoragePrefix}${site.href || site.folder || site.title || ''}`;
    }

    function getRemark(site) {
      try {
        return localStorage.getItem(getRemarkKey(site)) || '';
      } catch (error) {
        return '';
      }
    }

    function setRemark(site, value) {
      try {
        localStorage.setItem(getRemarkKey(site), value);
      } catch (error) {
        // Ignore storage errors so the table remains usable in restricted browser modes.
      }
    }

    function getTimestamp(value) {
      const timestamp = Date.parse(value);
      return Number.isFinite(timestamp) ? timestamp : 0;
    }

    function getLocalDayStart(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function getDayDifference(date) {
      const dayMs = 24 * 60 * 60 * 1000;
      return Math.round((getLocalDayStart(new Date()) - getLocalDayStart(date)) / dayMs);
    }

    function formatPreciseDate(value) {
      const timestamp = getTimestamp(value);
      if (!timestamp) return 'Unknown';
      return new Intl.DateTimeFormat(undefined, {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(timestamp));
    }

    function formatFriendlyDate(value) {
      const timestamp = getTimestamp(value);
      if (!timestamp) return 'Unknown';

      const date = new Date(timestamp);
      const dayDifference = getDayDifference(date);
      const weekday = new Intl.DateTimeFormat(undefined, { weekday: 'long' }).format(date);
      const time = new Intl.DateTimeFormat(undefined, {
        hour: 'numeric',
        minute: '2-digit'
      }).format(date);
      let dayLabel;

      if (dayDifference === 0) {
        dayLabel = 'Today';
      } else if (dayDifference === 1) {
        dayLabel = 'Yesterday';
      } else if (dayDifference > 1 && dayDifference < 7) {
        dayLabel = `Last ${weekday}`;
      } else if (dayDifference === -1) {
        dayLabel = 'Tomorrow';
      } else if (dayDifference < -1 && dayDifference > -7) {
        dayLabel = `Next ${weekday}`;
      } else {
        dayLabel = new Intl.DateTimeFormat(undefined, {
          year: 'numeric',
          month: 'short',
          day: '2-digit'
        }).format(date);
      }

      return `${dayLabel}, ${time}`;
    }

    function getFilterText(site, key) {
      if (key === 'createdAt') {
        return `${site.createdAt || ''} ${formatFriendlyDate(site.createdAt)} ${formatPreciseDate(site.createdAt)}`;
      }
      if (key === 'remarks') return getRemark(site);
      return site[key] || '';
    }

    function compareSites(a, b, key) {
      if (key === 'createdAt') {
        return getTimestamp(a.createdAt) - getTimestamp(b.createdAt);
      }
      if (key === 'remarks') {
        return getRemark(a).localeCompare(getRemark(b), undefined, {
          numeric: true,
          sensitivity: 'base'
        });
      }
      return String(a[key] || '').localeCompare(String(b[key] || ''), undefined, {
        numeric: true,
        sensitivity: 'base'
      });
    }

    function getVisibleSites() {
      const data = readManifest();
      const sites = Array.isArray(data.sites) ? data.sites : [];
      const filteredSites = sites.filter((site) => {
        const folder = String(site.folder || '');
        if (!folder || hasPrivateSegment(folder) || !site.href) return false;
        return Object.entries(filters).every(([key, filter]) => {
          if (!filter) return true;
          return normalize(getFilterText(site, key)).includes(filter);
        });
      });

      return filteredSites.sort((a, b) => {
        const result = compareSites(a, b, sortState.key);
        return sortState.direction === 'asc' ? result : -result;
      });
    }

    function renderSortState() {
      sortButtons.forEach((button) => {
        const key = button.dataset.sortKey;
        const marker = button.querySelector('.sort-mark');
        const active = key === sortState.key;
        marker.textContent = active ? (sortState.direction === 'asc' ? 'ASC' : 'DESC') : '';
      });

      headerCells.forEach((cell) => {
        const key = cell.querySelector('[data-sort-key]')?.dataset.sortKey;
        const active = key === sortState.key;
        cell.setAttribute('aria-sort', active ? (sortState.direction === 'asc' ? 'ascending' : 'descending') : 'none');
      });
    }

    function renderTable() {
      const sites = getVisibleSites();
      renderSortState();
      siteRows.innerHTML = '';

      if (sites.length === 0) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.className = 'empty';
        cell.colSpan = 6;
        cell.textContent = 'No public study sites match the current filters.';
        row.append(cell);
        siteRows.append(row);
        return;
      }

      sites.forEach((site, index) => {
        const row = document.createElement('tr');

        const countCell = document.createElement('td');
        countCell.className = 'count-cell';
        countCell.dataset.label = columns.count.label;
        countCell.textContent = String(index + 1);

        const folderCell = document.createElement('td');
        folderCell.dataset.label = columns.folder.label;
        const folderLink = document.createElement('a');
        folderLink.href = site.href;
        folderLink.target = '_blank';
        folderLink.rel = 'noopener noreferrer';
        folderLink.textContent = site.folder;
        folderCell.append(folderLink);

        const dateCell = document.createElement('td');
        dateCell.dataset.label = columns.createdAt.label;
        const time = document.createElement('time');
        time.dateTime = site.createdAt || '';
        time.title = formatPreciseDate(site.createdAt);
        time.textContent = formatFriendlyDate(site.createdAt);
        dateCell.append(time);

        const titleCell = document.createElement('td');
        titleCell.dataset.label = columns.title.label;
        titleCell.textContent = site.title || site.folder;

        const urlCell = document.createElement('td');
        urlCell.dataset.label = columns.href.label;
        const urlLink = document.createElement('a');
        urlLink.href = site.href;
        urlLink.target = '_blank';
        urlLink.rel = 'noopener noreferrer';
        urlLink.textContent = site.href;
        urlCell.append(urlLink);

        const remarksCell = document.createElement('td');
        remarksCell.className = 'remarks-cell';
        remarksCell.dataset.label = columns.remarks.label;
        const remarksInput = document.createElement('textarea');
        remarksInput.className = 'remarks-input';
        remarksInput.rows = 2;
        remarksInput.value = getRemark(site);
        remarksInput.setAttribute('aria-label', `Remarks for ${site.title || site.folder}`);
        remarksInput.addEventListener('input', () => setRemark(site, remarksInput.value));
        remarksCell.append(remarksInput);

        row.append(countCell, folderCell, dateCell, titleCell, urlCell, remarksCell);
        siteRows.append(row);
      });
    }

    sortButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const key = button.dataset.sortKey;
        if (sortState.key === key) {
          sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
        } else {
          sortState.key = key;
          sortState.direction = key === 'createdAt' ? 'desc' : 'asc';
        }
        renderTable();
      });
    });

    filterInputs.forEach((input) => {
      input.addEventListener('input', () => {
        filters[input.dataset.filterKey] = normalize(input.value.trim());
        renderTable();
      });
    });

    renderTable();
  </script>
</body>
